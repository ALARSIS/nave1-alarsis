<title>ALARSIS · Nave 1</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1117; min-height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; }

/* HEADER */
.header { background: #0f1117; padding: 12px 20px 0; border-bottom: 1px solid #1e2330; }
.header-top { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
.logo { color: #00d4aa; font-family: monospace; font-size: 11px; letter-spacing: .2em; font-weight: 700; }
.nave-title { color: #4a5568; font-family: monospace; font-size: 11px; }

/* TABS */
.tabs { display: flex; gap: 2px; }
.tab { padding: 8px 22px; font-family: monospace; font-size: 11px; font-weight: 700; letter-spacing: .08em;
       color: #4a5568; background: #161922; border: 1px solid #1e2330; border-bottom: none;
       cursor: pointer; border-radius: 4px 4px 0 0; transition: all .15s; user-select: none; }
.tab:hover { color: #8a93a8; background: #1a1f2e; }
.tab.active { color: #00d4aa; background: #0f1117; border-color: #2a3040; border-bottom-color: #0f1117; }

/* MAIN CONTENT */
.main { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
.tabs-content { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
.panel-wrap { display: none; flex: 1; }
.panel-wrap.active { display: flex; }

/* SVG */
svg { flex: 1; height: auto; display: block; }

/* ZONAS */
.zona { cursor: pointer; }
.zona rect { fill: #2d6a3a; stroke: #5aaa6a; stroke-width: 1.5; transition: filter .15s; }
.zona:hover rect { filter: brightness(1.3); }
.zona.sel rect { filter: brightness(1.6); stroke-width: 2.5; stroke: #00ffaa; }
.zona text { fill: #aaeebb; font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; font-family: sans-serif; }

/* ESTANTERÍAS */
.est { cursor: pointer; }
.est rect { fill: #c8dff5; stroke: #5a90c0; stroke-width: .8; transition: all .15s; }
.est:hover rect { fill: #a0c8f0; stroke: #00d4aa; stroke-width: 1.3; }
.est.sel rect { fill: #80b8e8; stroke: #00ffcc; stroke-width: 1.6; }
.est text { fill: #1a3a5a; font-size: 11px; font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; font-family: monospace; }

/* PANEL LATERAL */
#panel { width: 0; overflow: hidden; background: #161922; border-left: 2px solid #2a3040;
         transition: width .25s; flex-shrink: 0; display: flex; flex-direction: column; }
#panel.open { width: 280px; }
#ph { padding: 14px 16px 10px; border-bottom: 1px solid #2a3040; }
#pt { font-family: monospace; font-size: 15px; font-weight: 700; color: #00d4aa; }
#ps { font-size: 10px; color: #8a93a8; margin-top: 3px; }
#pcl { float: right; background: none; border: none; color: #8a93a8; font-size: 20px; cursor: pointer; }
#pcl:hover { color: #fff; }
#plist { flex: 1; overflow-y: auto; padding: 6px 0; }
.ri { padding: 9px 14px; border-bottom: 1px solid rgba(42,48,64,.5); }
.ri:hover { background: #1e2330; }
.ri-top { display: flex; justify-content: space-between; }
.ri-ref { font-family: monospace; font-size: 10px; font-weight: 700; color: #0099ff; }
.ri-stock { font-family: monospace; font-size: 12px; font-weight: 700; }
.ok{color:#00d4aa}.warn{color:#ffa726}.zero{color:#ff4d6d}
.ri-nom { font-size: 11px; color: #e8ecf4; margin-top: 2px; }
.ri-ubi { font-size: 9px; color: #8a93a8; margin-top: 3px; font-family: monospace; }
.empty { text-align: center; color: #4a5568; font-size: 11px; padding: 40px 14px; line-height: 1.8; }
.plbl { fill: #5a4a00; font-size: 7px; font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; font-family: monospace; }
</style>
</head>

<script>
// ── NAVEGACIÓN PESTAÑAS ──
function showTab(id) {
  document.querySelectorAll('.panel-wrap').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.tab')[['a0','a1','a2'].indexOf(id)].classList.add('active');
  cerrar();
}

// ── DATOS (vacíos, pendiente conectar Excel) ──
const datos = {};

// ── PANEL ──
let sel = null;
function clickZ(el, id) {
  _s(el);
  const r = datos[id] || [];
  show(`Zona ${id}`, `Zona de suelo · ${r.length} ref.`, r);
}
function clickE(el, est, loc) {
  _s(el);
  const key = `${est}-${loc}`;
  const r = datos[key] || [];
  const locs = {
    'TOP':'Fila superior', 'CEN':'Centro', 'COL':'Columna',
    'P4':'Pasillo P4', 'P3':'Pasillo P3', 'P2':'Pasillo P2', 'P1':'Pasillo P1',
    'ARR':'Arriba', 'DER':'Derecha', 'ABA':'Abajo',
    'Z5-P4':'Z5 · P4','Z5-P3':'Z5 · P3','Z5-P2':'Z5 · P2','Z5-P1':'Z5 · P1',
    'Z3-P4':'Z3 · P4','Z3-P3':'Z3 · P3','Z3-P2':'Z3 · P2','Z3-P1':'Z3 · P1',
  };
  show(`${est}`, locs[loc] || loc, r);
}
function _s(el) {
  if (sel) sel.classList.remove('sel');
  sel = el; el.classList.add('sel');
}
function show(t, s, refs) {
  document.getElementById('pt').textContent = t;
  document.getElementById('ps').textContent = s;
  const l = document.getElementById('plist');
  l.innerHTML = refs.length ? refs.map(r => {
    const c = r.stock===0?'zero':r.stock<=2?'warn':'ok';
    return `<div class="ri"><div class="ri-top"><span class="ri-ref">${r.ref}</span><span class="ri-stock ${c}">${r.stock} ud.</span></div><div class="ri-nom">${r.nom}</div><div class="ri-ubi">${r.ubi} · ${r.fam}</div></div>`;
  }).join('') : '<div class="empty">Sin referencias asignadas<br><br>Ubica aquí tus referencias<br>desde AppSheet</div>';
  document.getElementById('panel').classList.add('open');
}
function cerrar() {
  document.getElementById('panel').classList.remove('open');
  if (sel) { sel.classList.remove('sel'); sel = null; }
}
</script>
