name: Actualizar gantt.json

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Descargar gantt.json de OneDrive
        run: |
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -o gantt_temp.json "https://alarsis0-my.sharepoint.com/:u:/g/personal/francisco_alarsis_com/IQB_u2r1Q-8uRLjrUYjPUzwnAc0Lk4LRB-uyRimUDwN4NQ8?download=1"
          
          if python3 -c "import json,sys; json.load(open('gantt_temp.json'))" 2>/dev/null; then
            mv gantt_temp.json gantt.json
            echo "JSON válido descargado correctamente"
          else
            echo "ERROR: El archivo descargado no es JSON válido"
            cat gantt_temp.json
            exit 1
          fi

      - name: Commit y push
        run: |
          git config user.name "ALARSIS"
          git config user.email "francisco@alarsis.com"
          git add gantt.json
          git diff --staged --quiet || git commit -m "Actualizar gantt.json"
          git push
