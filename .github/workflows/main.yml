name: Actualizar gantt.json

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Descargar gantt.json de OneDrive
        run: |
          curl -L -o gantt.json "https://alarsis0-my.sharepoint.com/:u:/g/personal/francisco_alarsis_com/IQB_u2r1Q-8uRLjrUYjPUzwnAc0Lk4LRB-uyRimUDwN4NQ8?download=1"

      - name: Commit y push
        run: |
          git config user.name "ALARSIS"
          git config user.email "francisco@alarsis.com"
          git add gantt.json
          git diff --staged --quiet || git commit -m "Actualizar gantt.json"
          git push
