<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario de Producción · ALARSIS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Barlow+Condensed:wght@700;800&display=swap');

  :root {
    --bg:        #f0f2f5;
    --surface:   #ffffff;
    --surface2:  #e8ecf2;
    --border:    #c8d0dc;
    --text:      #0d1f35;
    --text-muted:#5a6a7e;
    --accent:    #1e3a5f;
    --accent2:   #2a5298;
    --accent-lt: #3a6bc4;
    --header-h:  56px;
    --row-h:     44px;
    --label-w:   320px;
    --day-w:     36px; /* sobreescrito por JS en tiempo de render */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: hidden;
  }

  /* HEADER */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 80px;
    background: var(--accent);
    border-bottom: 3px solid var(--accent2);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }

  .logo { display: flex; align-items: center; gap: 16px; }

  .logo-img { height: 64px; filter: brightness(0) invert(1); }

  .logo-divider {
    width: 1px; height: 32px;
    background: rgba(255,255,255,0.3);
  }

  .logo-sub {
    font-size: 15px; color: rgba(255,255,255,0.7);
    letter-spacing: 3px; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .last-update {
    font-family: 'JetBrains Mono', monospace; font-size: 15px;
    color: rgba(255,255,255,0.6);
  }

  .btn-refresh {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 6px 16px; border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .btn-refresh:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.6);
  }

  /* CONTROLES */
  .controls {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 24px; background: var(--surface);
    border-bottom: 2px solid var(--border); flex-wrap: wrap;
  }

  .control-group { display: flex; align-items: center; gap: 8px; }

  .control-label { font-size: 15px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

  .control-select, .control-input {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 4px; font-family: 'Rajdhani', sans-serif;
    font-size: 16px; outline: none;
  }
  .control-select:focus, .control-input:focus { border-color: var(--accent); }

  /* NAVEGACIÓN SEMANAL */
  .week-nav {
    display: flex; align-items: center; gap: 0;
    margin-left: auto;
  }

  .btn-week {
    background: var(--accent); border: 1px solid var(--accent2); color: #fff;
    width: 32px; height: 32px; border-radius: 4px; font-size: 19px;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .btn-week:hover { background: var(--accent2); border-color: var(--accent2); }

  .week-label {
    display: flex; flex-direction: column; align-items: center;
    padding: 0 16px; min-width: 160px;
    cursor: pointer; border-radius: 6px; transition: background 0.2s;
    position: relative;
  }
  .week-label:hover { background: rgba(59,130,246,0.08); }
  .week-label-hint {
    font-size: 13px; color: var(--text-muted); letter-spacing: 1px;
    font-family: 'JetBrains Mono', monospace; opacity: 0.6; margin-top: 1px;
  }
  /* Input date oculto, posicionado sobre la etiqueta */
  #datePicker {
    position: absolute; opacity: 0; pointer-events: none;
    width: 100%; height: 100%; top: 0; left: 0; cursor: pointer;
  }
  .week-label-month {
    font-size: 19px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    font-family: 'JetBrains Mono', monospace; line-height: 1.2;
  }
  .week-label-num {
    font-size: 15px; color: var(--text-muted); letter-spacing: 1px;
    font-family: 'JetBrains Mono', monospace;
  }

  .btn-today {
    background: var(--accent2); border: 1px solid var(--accent); color: #fff;
    padding: 4px 12px; border-radius: 4px; font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 600; letter-spacing: 1px; cursor: pointer;
    transition: all 0.2s; text-transform: uppercase; margin-left: 8px;
  }
  .btn-today:hover { background: var(--accent-lt); border-color: var(--accent-lt); }

  /* LEYENDA */
  .legend {
    display: flex; align-items: center; gap: 12px;
    padding: 6px 24px; background: var(--surface2);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 16px; color: var(--text-muted); }
  .legend-dot  { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

  /* GANTT CONTAINER */
  .gantt-wrapper { overflow-x: hidden; overflow-y: auto; max-height: calc(100vh - 180px); width: 100%; }
  .gantt-container { width: 100%; position: relative; min-width: 0; }

  /* CABECERA GANTT */
  .gantt-header {
    display: flex; position: sticky; top: 0; z-index: 50;
    background: var(--surface); border-bottom: 2px solid var(--border);
    width: 100%;
  }

  .gantt-label-header {
    width: var(--label-w); min-width: var(--label-w);
    padding: 0 16px; display: flex; align-items: center;
    height: var(--header-h); font-size: 17px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px; color: var(--accent);
    border-right: 1px solid var(--border);
    position: sticky; left: 0; background: var(--surface); z-index: 60;
  }

  .gantt-days-header { display: flex; flex: 1; align-items: stretch; }

  /* Cabecera semana: una sola fila con etiqueta + días */
  .week-header-block { display: flex; flex-direction: column; flex: 1; height: 100%; }



  .days-row { display: flex; flex: 1; align-items: stretch; }

  .day-cell {
    flex: 1; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    font-size: 14px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted); border-right: 1px solid var(--border);
  }

  .day-cell.nonworking { background: #92d050; color: #1a3a0a; font-weight: 700; }

  /* Bloque festivo fusionado — cabecera */
  .day-cell-nw-block {
    height: 34px;
    display: flex; align-items: center; justify-content: center;
    background: #92d050;
    border-right: 2px solid #6ab032;
    border-left: 2px solid #6ab032;
    flex-shrink: 0;
  }
  .nw-block-name {
    font-size: 16px; font-weight: 700; color: #1a3a0a;
    font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
    text-transform: uppercase; text-align: center;
  }

  /* Bloque festivo fusionado — fondos de fila */
  .day-bg-nw-block {
    height: 100%;
    background: rgba(146,208,80,0.25);
    border-right: 2px solid rgba(106,176,50,0.5);
    border-left: 2px solid rgba(106,176,50,0.5);
    flex-shrink: 0;
  }
  .day-cell.today {
    background: rgba(220,38,38,0.1); color: #dc2626;
    box-shadow: inset 0 0 0 3px #dc2626;
  }
  .day-cell.today .day-num { font-weight: 900; font-size: 18px; }
  .day-cell.today .day-name { font-weight: 800; }

  .day-num  { font-size: 15px; font-weight: 700; display: block; text-align: center; width: 100%; }
  .day-name { font-size: 13px; opacity: 0.75; font-weight: 500; display: block; text-align: center; width: 100%; }

  /* Etiqueta festivo en cabecera */
  .day-cell.nonworking .day-festivo {
    font-size: 11px; line-height: 1; text-align: center;
    max-width: 34px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    color: #1a3a0a; font-family: 'Rajdhani', sans-serif; font-weight: 600;
  }

  /* FILAS */
  .gantt-row {
    display: flex; height: var(--row-h);
    border-bottom: 1px solid var(--border); position: relative;
  }
  .gantt-row:hover { background: rgba(0,0,0,0.02); }

  .gantt-row-label {
    width: var(--label-w); min-width: var(--label-w);
    display: flex; align-items: center; padding: 0 16px; gap: 10px;
    border-right: 1px solid var(--border);
    position: sticky; left: 0; background: var(--surface); z-index: 10; cursor: pointer;
  }
  .gantt-row:hover .gantt-row-label { background: var(--surface2); }

  .row-key { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--accent2); white-space: nowrap; flex-shrink: 0; font-weight: 700; }
  .row-info { overflow: hidden; }
  .row-machine { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-bastidor { font-size: 15px; color: var(--text-muted); font-weight: 400; }
  .row-client  { font-size: 16px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* AREA DEL GANTT */
  .gantt-row-bars { position: relative; display: flex; flex: 1; min-width: 0; }

  .day-bg-filler { display: none; }

  .day-bg {
    flex: 1; height: 100%;
    border-right: 1px solid rgba(42,47,63,0.5);
  }
  .day-bg.nonworking { background: rgba(146,208,80,0.15); }
  .day-bg.today { background: rgba(220,38,38,0.04); }

  /* BARRA */
  .gantt-bar {
    position: absolute; top: 50%; transform: translateY(-50%);
    height: 28px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center; padding: 0 8px;
    font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; transition: filter 0.2s, box-shadow 0.2s; z-index: 5;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .gantt-bar:hover { filter: brightness(1.15); box-shadow: 0 2px 12px rgba(0,0,0,0.6); z-index: 20; }

  /* Línea de hoy */
  .today-line { display: none; }

  /* TOOLTIP */
  .tooltip {
    position: fixed; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 16px; font-size: 16px; z-index: 1000;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
    min-width: 240px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .tooltip-row { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 4px; color: var(--text-muted); }
  .tooltip-row span:last-child { color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 15px; }

  /* LOADING */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 16px; color: var(--text-muted); }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'JetBrains Mono', monospace; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }

  /* ERROR */
  .error-msg { display: flex; align-items: center; justify-content: center; height: 200px; color: #ff6b6b; font-family: 'JetBrains Mono', monospace; font-size: 16px; text-align: center; padding: 24px; }

  /* STATS BAR */
  .stats-bar { display: flex; gap: 24px; padding: 8px 24px; background: var(--surface2); border-bottom: 2px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--text-muted); }
  .stat { display: flex; gap: 6px; }
  .stat-val { color: var(--text); font-weight: 600; }

  /* EMPTY */

  /* BUSCADOR BASTIDOR */
  .bastidor-wrapper { position: relative; }
  .bastidor-result {
    position: absolute; top: calc(100% + 4px); left: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 200; min-width: 280px;
  }
  .bastidor-result-item {
    padding: 8px 12px; cursor: pointer; font-size: 16px;
    font-family: 'Rajdhani', sans-serif;
    display: flex; flex-direction: column; gap: 2px;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .bastidor-result-item:last-child { border-bottom: none; }
  .bastidor-result-item:hover { background: #eff6ff; }
  .bri-key { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--accent); font-weight: 700; }
  .bri-info { font-size: 16px; color: var(--text-muted); }

  /* AUTOCOMPLETADO BUSCADOR */
  .search-wrapper { position: relative; }

  .autocomplete-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 200; min-width: 260px; max-height: 300px; overflow-y: auto;
  }

  .autocomplete-section {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .autocomplete-section:last-child { border-bottom: none; }

  .autocomplete-section-title {
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted);
    padding: 4px 12px 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .autocomplete-item {
    padding: 6px 12px; cursor: pointer; font-size: 16px;
    font-family: 'Rajdhani', sans-serif; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.1s;
  }
  .autocomplete-item:hover { background: #e8eef6; color: var(--accent); }
  .autocomplete-item .ac-badge {
    font-size: 14px; background: var(--surface2); border-radius: 3px;
    padding: 1px 5px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .autocomplete-item.ac-client { color: var(--text-muted); font-style: italic; }
  .autocomplete-item.ac-client:hover { color: var(--accent); font-style: normal; }

  /* BARRA DE RESULTADOS BÚSQUEDA */
  .search-results-bar {
    display: none;
    flex-direction: column;
    background: #e8eef6;
    border-bottom: 2px solid #b0c4de;
  }
  .search-results-bar.visible { display: flex; }
  .search-results-header {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; color: var(--accent); font-weight: 600;
    border-bottom: 1px solid #b0c4de;
  }
  .search-results-count { color: var(--accent); }
  .search-results-list {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 8px 24px;
  }
  .search-result-item {
    display: flex; align-items: center; gap: 8px;
    background: #fff; border: 1px solid #b0c4de;
    border-radius: 5px; padding: 4px 10px;
    cursor: pointer; transition: all 0.15s;
    font-family: 'Rajdhani', sans-serif;
  }
  .search-result-item:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .search-result-item:hover .sri-week { color: #bfdbfe; }
  .sri-key { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: #3b82f6; }
  .search-result-item:hover .sri-key { color: #fff; }
  .sri-machine { font-size: 16px; font-weight: 600; }
  .sri-client { font-size: 16px; color: #6b7280; font-style: italic; }
  .search-result-item:hover .sri-client { color: #bfdbfe; }
  .sri-week { font-size: 14px; color: #6b7280; font-family: 'JetBrains Mono', monospace; }
  .gantt-empty { display: flex; align-items: center; justify-content: center; height: 100px; color: var(--text-muted); font-size: 16px; font-family: 'JetBrains Mono', monospace; }

  /* VACACIONES BANNER */
  .vacaciones-banner {
    display: flex; align-items: center; justify-content: center;
    height: 60px; background: #92d050; color: #1a3a0a;
    font-size: 22px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    font-family: 'Rajdhani', sans-serif;
    border-bottom: 2px solid #6ab032;
  }
</style>
</head>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const JSON_URL     = 'https://raw.githubusercontent.com/ALARSIS/nave1-alarsis/main/gantt.json';
const FESTIVOS_URL = 'https://raw.githubusercontent.com/ALARSIS/nave1-alarsis/main/festivos.json';

// ─── ESTADO ──────────────────────────────────────────────────────────────────
let allData        = [];
let nonWorkingMap  = {};   // dateKey -> nombre
let currentWeekMonday = getThisWeekMonday();
let searchWeeks    = [];   // lista de lunes de semanas con resultados
let searchWeekIdx  = 0;    // índice actual en searchWeeks

// ─── MESES ES ─────────────────────────────────────────────────────────────────
const MONTHS_ES     = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const MONTHS_ES_ABR = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const DAY_NAMES     = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

// ─── UTILIDADES FECHA ─────────────────────────────────────────────────────────
function parseDate(val) {
  if (!val) return null;
  if (typeof val === 'number') {
    const d = new Date((val - 25569) * 86400 * 1000);
    return isNaN(d) ? null : d;
  }
  if (/^\d{8}$/.test(String(val))) {
    const s = String(val);
    return new Date(s.slice(0,4), parseInt(s.slice(4,6))-1, parseInt(s.slice(6,8)));
  }
  const d = new Date(val);
  return isNaN(d) ? null : d;
}

function dateToStr(d) {
  if (!d) return '—';
  return d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
}

function dateKey(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

function isNonWorking(d) {
  return dateKey(d) in nonWorkingMap;
}

function getNonWorkingName(d) {
  return nonWorkingMap[dateKey(d)] || '';
}

function getThisWeekMonday() {
  const today = new Date();
  const day = today.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  const monday = new Date(today);
  monday.setDate(today.getDate() + diff);
  monday.setHours(0,0,0,0);
  return monday;
}

// Semana ISO (norma española)
function getISOWeek(d) {
  const date = new Date(d);
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 3 - (date.getDay()+6)%7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay()+6)%7) / 7);
}

// Mes del miércoles de la semana (más representativo)
function getWeekMonth(monday) {
  const wed = addDays(monday, 2);
  return MONTHS_ES[wed.getMonth()];
}

// ─── NAVEGACIÓN ───────────────────────────────────────────────────────────────
function changeWeek(dir) {
  currentWeekMonday = addDays(currentWeekMonday, dir * 7);
  syncYearFilterToWeek();
  renderGantt();
}

function goToToday() {
  currentWeekMonday = getThisWeekMonday();
  syncYearFilterToWeek();
  renderGantt();
}

function goToDate(dateStr) {
  if (!dateStr) return;
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return;
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  const monday = new Date(d);
  monday.setDate(d.getDate() + diff);
  monday.setHours(0,0,0,0);
  currentWeekMonday = monday;
  syncYearFilterToWeek();
  renderGantt();
}

function getMondayOf(d) {
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  const monday = new Date(d);
  monday.setDate(d.getDate() + diff);
  monday.setHours(0,0,0,0);
  return monday;
}

// ─── AUTOCOMPLETADO EN CASCADA ────────────────────────────────────────────────
let acStep = 'serie';      // 'serie' | 'cliente'
let acSelectedModel = '';  // modelo elegido en paso 1
let acSelectedClient = ''; // cliente elegido en paso 2
let activeBastidorKey = ''; // KeyPedido del bastidor activo

function getFilteredPool() {
  const year  = document.getElementById('filterYear').value;
  const serie = document.getElementById('filterSerie').value;
  return allData.filter(row => {
    if (serie && !row.KeyPedido?.startsWith(serie)) return false;
    if (year) {
      const y = parseInt(year);
      const fechaRef = getRelevantDate(row);
      if (!fechaRef || fechaRef.getFullYear() !== y) return false;
    }
    return true;
  });
}

function onSearchInput() {
  const val = document.getElementById('filterSearch').value.trim();

  // Si el campo está vacío: cerrar dropdown, limpiar resultados
  if (!val) {
    closeDropdown();
    acStep = 'serie';
    acSelectedModel = '';
    acSelectedClient = '';
    activeBastidorKey = '';
    document.getElementById('filterBastidor').value = '';
    clearSearchResults();
    renderGantt();
    return;
  }

  // Si el usuario edita manualmente y el texto no coincide con el modelo seleccionado,
  // resetear selecciones previas
  if (acSelectedModel && val !== acSelectedModel && !val.startsWith(acSelectedModel)) {
    acSelectedModel = '';
    acSelectedClient = '';
  }

  // Paso 1: sugerir modelos únicos que contengan el texto
  const pool   = getFilteredPool();
  const valLow = val.toLowerCase();

  // Modelos únicos que coinciden
  const modelMap = new Map();
  pool.forEach(row => {
    const maq = row.Máquina || row.Maquina || '';
    if (!maq) return;
    if (maq.toLowerCase().includes(valLow)) {
      if (!modelMap.has(maq)) modelMap.set(maq, 0);
      modelMap.set(maq, modelMap.get(maq) + 1);
    }
  });

  // Clientes únicos que coinciden directamente
  const clientMap = new Map();
  pool.forEach(row => {
    const cli = row.CLIENTE || '';
    if (!cli) return;
    if (cli.toLowerCase().includes(valLow)) {
      if (!clientMap.has(cli)) clientMap.set(cli, 0);
      clientMap.set(cli, clientMap.get(cli) + 1);
    }
  });

  buildDropdown(modelMap, clientMap, valLow);
}

function onSearchKey(e) {
  if (e.key === 'Escape') { closeDropdown(); return; }
  if (e.key === 'Enter') {
    closeDropdown();
    launchSearch(document.getElementById('filterSearch').value.trim());
  }
}

function buildDropdown(modelMap, clientMap, valLow) {
  const dd = document.getElementById('acDropdown');
  dd.innerHTML = '';

  let hasContent = false;

  // Sección modelos
  if (modelMap.size > 0) {
    hasContent = true;
    const sec = document.createElement('div');
    sec.className = 'autocomplete-section';
    sec.innerHTML = '<div class="autocomplete-section-title">Modelos</div>';

    const sorted = [...modelMap.entries()].sort((a,b) => {
      // Primero los que empiezan por el texto buscado
      const aStarts = a[0].toLowerCase().startsWith(valLow) ? 0 : 1;
      const bStarts = b[0].toLowerCase().startsWith(valLow) ? 0 : 1;
      if (aStarts !== bStarts) return aStarts - bStarts;
      return a[0].localeCompare(b[0]);
    });
    sorted.slice(0, 50).forEach(([maq, count]) => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      item.innerHTML = `<span>${maq}</span><span class="ac-badge">${count}</span>`;
      item.onclick = () => selectModel(maq);
      sec.appendChild(item);
    });
    dd.appendChild(sec);
  }

  // Sección clientes
  if (clientMap.size > 0) {
    hasContent = true;
    const sec = document.createElement('div');
    sec.className = 'autocomplete-section';
    sec.innerHTML = '<div class="autocomplete-section-title">Clientes</div>';

    const sorted = [...clientMap.entries()].sort((a,b) => a[0].localeCompare(b[0]));
    sorted.slice(0, 10).forEach(([cli, count]) => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item ac-client';
      item.innerHTML = `<span>${cli}</span><span class="ac-badge">${count}</span>`;
      item.onclick = () => selectClient(cli);
      sec.appendChild(item);
    });
    dd.appendChild(sec);
  }

  dd.style.display = hasContent ? 'block' : 'none';
}

function selectModel(maq) {
  acSelectedModel = maq;
  acSelectedClient = '';
  acStep = 'cliente';
  document.getElementById('filterSearch').value = maq;

  // Lanzar búsqueda inmediatamente con el modelo seleccionado
  searchAndJump();

  // Mostrar clientes de ese modelo en el dropdown
  const pool = getFilteredPool();
  const clientMap = new Map();
  pool.forEach(row => {
    const m = row.Máquina || row.Maquina || '';
    if (m !== maq) return;
    const cli = row.CLIENTE || '';
    if (!cli) return;
    if (!clientMap.has(cli)) clientMap.set(cli, 0);
    clientMap.set(cli, clientMap.get(cli) + 1);
  });

  const dd = document.getElementById('acDropdown');
  dd.innerHTML = '';

  if (clientMap.size > 0) {
    const sec = document.createElement('div');
    sec.className = 'autocomplete-section';
    sec.innerHTML = '<div class="autocomplete-section-title">Filtrar por cliente</div>';
    const sorted = [...clientMap.entries()].sort((a,b) => a[0].localeCompare(b[0]));
    sorted.forEach(([cli, count]) => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item ac-client';
      item.innerHTML = `<span>${cli}</span><span class="ac-badge">${count}</span>`;
      item.onclick = () => selectClient(cli);
      sec.appendChild(item);
    });
    dd.appendChild(sec);
    dd.style.display = 'block';
  } else {
    closeDropdown();
  }
}

function selectClient(cli) {
  acSelectedClient = cli;
  const searchVal = acSelectedModel ? acSelectedModel + ' ' + cli : cli;
  document.getElementById('filterSearch').value = searchVal;
  closeDropdown();
  launchSearch(searchVal);
}

function closeDropdown() {
  document.getElementById('acDropdown').style.display = 'none';
}

function clearSearchResults() {
  const bar = document.getElementById('searchResultsBar');
  bar.classList.remove('visible');
  searchWeeks = [];
  searchWeekIdx = 0;
}

// Cerrar dropdown al clicar fuera
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrapper')) closeDropdown();
});

function launchSearch(searchVal) {
  document.getElementById('filterSearch').value = searchVal;
  searchAndJump();
}

function searchAndJump() {
  const raw    = document.getElementById('filterSearch').value.trim();
  const search = raw.toLowerCase();
  const bar    = document.getElementById('searchResultsBar');

  if (!search) {
    searchWeeks = [];
    searchWeekIdx = 0;
    bar.classList.remove('visible');
    renderGantt();
    return;
  }

  const serie = document.getElementById('filterSerie').value;

  // Encontrar todos los pedidos que coinciden
  const year = document.getElementById('filterYear').value;
  const matches = allData.filter(row => {
    if (serie && !row.KeyPedido?.startsWith(serie)) return false;
    if (year) {
      const ini = parseDate(row.EntradaProd);
      const fin = parseDate(row['ModFecha Pentrega'] || row.ModFecha_Pentrega || row['Fecha Pentrega'] || row.Fecha_Pentrega);
      const y = parseInt(year);
      if (!(ini?.getFullYear() === y || fin?.getFullYear() === y)) return false;
    }
    // Si hay modelo y cliente seleccionados via autocompletado, filtrar por campos exactos
    if (acSelectedModel && acSelectedClient) {
      const maq = row.Máquina || row.Maquina || '';
      const cli = row.CLIENTE || '';
      return maq === acSelectedModel && cli === acSelectedClient;
    }
    // Si solo hay modelo seleccionado
    if (acSelectedModel) {
      const maq = row.Máquina || row.Maquina || '';
      return maq === acSelectedModel;
    }
    // Búsqueda libre
    const hay = (row.CLIENTE || '') + ' ' + (row.Máquina || row.Maquina || '') + ' ' + (row.KeyPedido || '');
    return hay.toLowerCase().includes(search);
  });

  if (matches.length === 0) {
    bar.classList.remove('visible');
    renderGantt();
    return;
  }

  // Ordenar matches por fecha relevante
  matches.sort((a, b) => {
    const fa = getRelevantDate(a), fb = getRelevantDate(b);
    if (fa && fb) return fa - fb;
    if (fa) return -1;
    if (fb) return 1;
    return 0;
  });

  // Construir lista de pedidos clickables
  const list = document.getElementById('searchResultsList');
  list.innerHTML = '';
  matches.forEach(row => {
    const d = getRelevantDate(row);
    const monday = d ? getMondayOf(d) : null;
    const iso  = monday ? getISOWeek(monday) : '—';
    const mes  = monday ? MONTHS_ES_ABR[addDays(monday,2).getMonth()] : '—';
    const year = monday ? monday.getFullYear() : '—';
    const key  = row.KeyPedido || '—';
    const maq  = row.Máquina || row.Maquina || '—';

    const cli  = row.CLIENTE || '—';
    const item = document.createElement('div');
    item.className = 'search-result-item';
    item.innerHTML = `
      <span class="sri-key">${key}</span>
      <span class="sri-machine">${maq}</span>
      <span class="sri-client">${cli}</span>
      <span class="sri-week">Sem.${iso} ${mes} ${year}</span>
    `;
    if (monday) {
      item.onclick = () => jumpToSearchResult(monday);
    }
    list.appendChild(item);
  });

  document.getElementById('searchResultsCount').textContent =
    `${matches.length} pedido${matches.length > 1 ? 's' : ''} encontrado${matches.length > 1 ? 's' : ''}`;
  bar.classList.add('visible');

  // Saltar automáticamente al primer resultado
  if (matches.length > 0) {
    const first = getRelevantDate(matches[0]);
    if (first) jumpToSearchResult(getMondayOf(first));
  }
}

function jumpToSearchResult(monday) {
  currentWeekMonday = new Date(monday);
  currentWeekMonday.setHours(0,0,0,0);
  syncYearFilterToWeek();
  renderGantt();
}

function syncYearFilterToWeek() {
  const wed = addDays(currentWeekMonday, 2);
  const y = String(wed.getFullYear());
  const sel = document.getElementById('filterYear');
  if (sel) {
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === y) { sel.value = y; break; }
    }
  }
}

function onYearChange() {
  const y = parseInt(document.getElementById('filterYear').value);
  if (y) {
    const jan4 = new Date(y, 0, 4);
    const day = jan4.getDay();
    const diff = (day === 0) ? -6 : 1 - day;
    currentWeekMonday = new Date(jan4);
    currentWeekMonday.setDate(jan4.getDate() + diff);
    currentWeekMonday.setHours(0,0,0,0);
  }
  // Si hay modelo/cliente seleccionado o texto en buscador, relanzar búsqueda
  // preservando acSelectedModel y acSelectedClient
  if (acSelectedModel || acSelectedClient || document.getElementById('filterSearch').value.trim()) {
    searchAndJump();
  } else {
    renderGantt();
  }
}

// ─── CARGA DE DATOS ──────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('ganttWrapper').innerHTML = `
    <div class="loading"><div class="spinner"></div>
    <div class="loading-text">Cargando producción...</div></div>`;
  document.getElementById('lastUpdate').textContent = 'Actualizando...';

  try {
    const [resGantt, resFestivos] = await Promise.all([
      fetch(JSON_URL + '?t=' + Date.now()),
      fetch(FESTIVOS_URL + '?t=' + Date.now())
    ]);

    if (!resGantt.ok) throw new Error('HTTP ' + resGantt.status);
    const raw = await resGantt.json();
    allData = Array.isArray(raw) ? raw : (raw.value || raw.data || []);

    nonWorkingMap = {};
    if (resFestivos.ok) {
      const fest = await resFestivos.json();
      (fest.festivos   || []).forEach(f => nonWorkingMap[f.fecha] = f.nombre);
      (fest.vacaciones || []).forEach(f => nonWorkingMap[f.fecha] = f.nombre);
    }

    document.getElementById('lastUpdate').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});

    populateYearFilter();
    renderGantt();
    adjustWrapperHeight();
  } catch(e) {
    document.getElementById('ganttWrapper').innerHTML =
      `<div class="error-msg">⚠ No se pudo cargar gantt.json<br>
      <small style="opacity:0.6;margin-top:8px;display:block">${e.message}</small></div>`;
    document.getElementById('lastUpdate').textContent = 'Error al cargar';
  }
}

// ─── FILTRO AÑO ──────────────────────────────────────────────────────────────
function populateYearFilter() {
  const years = new Set();
  allData.forEach(row => {
    const d = parseDate(row.EntradaProd);
    if (d) years.add(d.getFullYear());
    const d2 = parseDate(row['Fecha Pentrega'] || row.Fecha_Pentrega);
    if (d2) years.add(d2.getFullYear());
  });
  const sel = document.getElementById('filterYear');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos</option>';
  [...years].sort().forEach(y => {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (String(y) === String(cur) || (!cur && y === new Date().getFullYear())) opt.selected = true;
    sel.appendChild(opt);
  });
  // Sincronizar currentWeekMonday con el año seleccionado si no hay valor previo
  if (!cur) syncYearFilterToWeek();
}

// ─── FILTRO DE DATOS ─────────────────────────────────────────────────────────
function getFilteredData() {
  const serie = document.getElementById('filterSerie').value;
  const hayBusqueda = acSelectedModel || acSelectedClient ||
                      document.getElementById('filterSearch').value.trim();

  // Rango de la semana visible
  const weekStart = new Date(currentWeekMonday); weekStart.setHours(0,0,0,0);
  const weekEnd   = addDays(weekStart, 4);        weekEnd.setHours(23,59,59,999);
  const mondayCur = new Date(currentWeekMonday);  mondayCur.setHours(0,0,0,0);

  return allData.filter(row => {
    const inicio = parseDate(row.EntradaProd);
    const fin    = parseDate(row['ModFecha Pentrega'] || row.ModFecha_Pentrega ||
                             row['Fecha Pentrega']    || row.Fecha_Pentrega);

    // Filtro serie
    if (serie && !row.KeyPedido?.startsWith(serie)) return false;

    // Filtro por bastidor activo
    if (activeBastidorKey) {
      if ((row.KeyPedido || '') !== activeBastidorKey) return false;
    }

    // MQ con Origen MS: solo mostrar si tiene Fecha salida MQ rellena
    const estadoRow = row['Estado MQ'] || row.Estado_MQ || '';
    if (estadoRow === 'Origen MS') {
      const fechaSalidaMQ = row['Fecha salida MQ'] || row.Fecha_salida_MQ;
      if (!fechaSalidaMQ) return false;
    }

    // MS: ocultar si su MQ asociado ya tiene Fecha salida MQ (ya entregado)
    if ((row.KeyPedido || '').startsWith('MS') && isMSEntregado(row)) return false;

    // Filtro por modelo/cliente (autocompletado) o texto libre
    if (acSelectedModel && acSelectedClient) {
      const maq = row.Máquina || row.Maquina || '';
      const cli = row.CLIENTE || '';
      if (maq !== acSelectedModel || cli !== acSelectedClient) return false;
    } else if (acSelectedModel) {
      const maq = row.Máquina || row.Maquina || '';
      if (maq !== acSelectedModel) return false;
    } else {
      const txt = document.getElementById('filterSearch').value.toLowerCase().trim();
      if (txt) {
        const hay = (row.CLIENTE||'') + ' ' + (row.Máquina||row.Maquina||'') + ' ' + (row.KeyPedido||'');
        if (!hay.toLowerCase().includes(txt)) return false;
      }
    }

    // Filtro semana
    if (hayBusqueda) {
      const fechaRef = getRelevantDate(row);
      if (!fechaRef) return false;
      const mondayRef = getMondayOf(fechaRef);
      if (mondayRef.getTime() !== mondayCur.getTime()) return false;
    } else {
      // Modo normal: usar fecha relevante para posicionar
      const fechaRef = getRelevantDate(row);
      if (!fechaRef) return false;
      const barEnd = fin || fechaRef;
      if (barEnd < weekStart || fechaRef > weekEnd) return false;
    }

    return true;
  });
}

// ─── VINCULACIÓN MQ → MS ─────────────────────────────────────────────────────
// Comprueba si un MS tiene algún MQ asociado con Fecha salida MQ rellena
function isMSEntregado(row) {
  const key = row.KeyPedido || '';
  if (!key.startsWith('MS')) return false;
  // Extraer número del MS
  const mNum = key.match(/MS-?(\d+)/i);
  if (!mNum) return false;
  const msNum = parseInt(mNum[1]);
  // Buscar MQ que consuma este MS y tenga Fecha salida MQ
  return allData.some(r => {
    const estado = r['Estado MQ'] || r.Estado_MQ || '';
    if (estado !== 'Origen MS') return false;
    const obs = r['Observaciones de pedido'] || '';
    const m = obs.match(/MS(\d+)/i);
    if (!m || parseInt(m[1]) !== msNum) return false;
    return !!(r['Fecha salida MQ'] || r.Fecha_salida_MQ);
  });
}

function getMSForMQ(row) {
  const estado = row['Estado MQ'] || row.Estado_MQ || '';
  if (estado !== 'Origen MS') return null;
  const obs = row['Observaciones de pedido'] || '';
  // Extraer número MS: buscar MS seguido de dígitos
  const match = obs.match(/MS(\d+)/i);
  if (!match) return null;
  const msNum = parseInt(match[1]);
  // Buscar el MS en allData por KeyPedido (formato MS-XXX)
  return allData.find(r => {
    const key = r.KeyPedido || '';
    const m = key.match(/MS-?(\d+)/i);
    return m && parseInt(m[1]) === msNum;
  }) || null;
}

// ─── FECHA RELEVANTE GLOBAL ──────────────────────────────────────────────────
// Prioridad: EntradaProd (si existe, manda) → Fecha salida MQ → Fecha fin Fab
//            → ModFecha Pentrega → Fecha Pentrega
function getRelevantDate(row) {
  // 1. EntradaProd del propio pedido — manda siempre
  const entrada = parseDate(row.EntradaProd);
  if (entrada) return entrada;

  // 2. Fecha salida MQ — si está entregado, esta es la fecha relevante
  const salida = parseDate(row['Fecha salida MQ'] || row.Fecha_salida_MQ);
  if (salida) return salida;

  // 3. Si es MQ con Origen MS, usar fechas del MS asociado
  const ms = getMSForMQ(row);
  if (ms) {
    const msEntrada = parseDate(ms.EntradaProd);
    if (msEntrada) return msEntrada;
    const msFinFab = parseDate(ms['Fecha fin Fab'] || ms.Fecha_fin_Fab);
    if (msFinFab) return msFinFab;
  }

  // 4. Resto de fechas propias
  return parseDate(row['Fecha fin Fab']   || row.Fecha_fin_Fab) ||
         parseDate(row['ModFecha Pentrega'] || row.ModFecha_Pentrega) ||
         parseDate(row['Fecha Pentrega']  || row.Fecha_Pentrega);
}

// ─── RENDER PRINCIPAL ────────────────────────────────────────────────────────
function calcLabelWidth() {
  // Medir el texto más largo de máquina + bastidor en los datos visibles
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = '600 17px Rajdhani, sans-serif'; // igual que row-machine
  let maxW = 220; // mínimo
  allData.forEach(row => {
    const maq = row.Máquina || row.Maquina || '';
    const bas = row['Código bastidor'] || row.Codigo_bastidor || '';
    const txt = maq + (bas ? ' · ' + bas : '');
    const w = ctx.measureText(txt).width + 80; // 80px de padding + key
    if (w > maxW) maxW = w;
  });
  return Math.min(Math.ceil(maxW), Math.floor(window.innerWidth * 0.35)); // máx 35% ventana
}

function calcDayWidth() {
  const labelW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--label-w')) || 320;
  const available = window.innerWidth - labelW - 18;
  return Math.max(36, Math.floor(available / 5));
}

function renderGantt() {
  // Calcular ancho dinámico de columna label y días
  const LABEL_W = calcLabelWidth();
  document.documentElement.style.setProperty('--label-w', LABEL_W + 'px');
  const DAY_W = calcDayWidth();
  document.documentElement.style.setProperty('--day-w', DAY_W + 'px');

  // Días de la semana: lun a vie
  const weekDays = [];
  for (let i = 0; i < 5; i++) weekDays.push(addDays(currentWeekMonday, i));

  // Etiqueta semana
  const isoWeek   = getISOWeek(currentWeekMonday);
  const weekMonth = getWeekMonth(currentWeekMonday);
  document.getElementById('navMonth').textContent = weekMonth;
  document.getElementById('navWeek').textContent  = 'Semana ' + isoWeek;

  const data = getFilteredData();

  // Ordenar por fecha de entrega más próxima (ModFecha Pentrega preferente, si no Fecha Pentrega)
  data.sort((a, b) => {
    const fa = parseDate(a['ModFecha Pentrega'] || a.ModFecha_Pentrega || a['Fecha Pentrega'] || a.Fecha_Pentrega);
    const fb = parseDate(b['ModFecha Pentrega'] || b.ModFecha_Pentrega || b['Fecha Pentrega'] || b.Fecha_Pentrega);
    if (fa && fb) return fa - fb;
    if (fa) return -1;  // los que tienen fecha van antes
    if (fb) return 1;
    return 0;
  });

  // Comprobar si toda la semana es vacaciones/festivos
  const allNonWorking = weekDays.every(d => isNonWorking(d));
  // Nombre del bloque (primer nombre encontrado, ej "Vacaciones de Verano")
  const nwName = allNonWorking ? getNonWorkingName(weekDays[0]) : '';

  let html = '<div class="gantt-container">';

  // ── Cabecera ──
  const weekWidthPx = weekDays.length * DAY_W;
  html += '<div class="gantt-header">';
  html += `<div class="gantt-label-header">PEDIDO / MÁQUINA</div>`;
  html += '<div class="gantt-days-header">';
  html += `<div class="week-header-block">`;
  
  html += '<div class="days-row">';
  // Agrupar días consecutivos no laborables en bloques fusionados
  let i = 0;
  while (i < weekDays.length) {
    const d = weekDays[i];
    const nw = isNonWorking(d);
    const td = isToday(d);
    if (nw && !td) {
      // Contar cuántos días consecutivos son no laborables
      let j = i;
      const nwNombre = getNonWorkingName(d);
      while (j < weekDays.length && isNonWorking(weekDays[j]) && !isToday(weekDays[j])) j++;
      const count = j - i;
      // Bloque fusionado — ancho en px calculado directamente
      html += `<div class="day-cell-nw-block" style="width:${DAY_W * count}px">
        <span class="nw-block-name">${nwNombre}</span>
      </div>`;
      i = j;
    } else {
      const cls = td ? 'today' : '';
      html += `<div class="day-cell ${cls}">
        <span class="day-num">${d.getDate()}</span>
        <span class="day-name">${DAY_NAMES[d.getDay()]}</span>
      </div>`;
      i++;
    }
  }

  html += '</div></div></div></div>';

  // ── Body ──
  html += '<div class="gantt-body">';

  if (allNonWorking) {
    // Semana completa de vacaciones/festivos
    html += `<div class="vacaciones-banner">${nwName || 'Festivo / Vacaciones'}</div>`;
  } else if (data.length === 0) {
    html += '<div class="gantt-empty">Sin pedidos activos esta semana</div>';
  } else {
    // Índice de hoy dentro de los días visibles
    const todayIdx = weekDays.findIndex(d => isToday(d));
    const todayLeft = todayIdx >= 0 ? todayIdx * DAY_W : -1;

    data.forEach(row => {
      const maquina    = row.Máquina || row.Maquina || '—';
      const cliente    = row.CLIENTE || '—';
      const key        = row.KeyPedido || '—';
      const fechaSalida = row['Fecha salida MQ'] || row.Fecha_salida_MQ;
      const fechaFinFab = row['Fecha fin Fab']   || row.Fecha_fin_Fab;
      const fechaPent   = row['ModFecha Pentrega'] || row.ModFecha_Pentrega || row['Fecha Pentrega'] || row.Fecha_Pentrega;

      let color;
      if (fechaSalida)      color = '#00b050';
      else if (fechaFinFab) color = '#92d050';
      else if (fechaPent)   color = '#ffff00';
      else                  color = '#4b5563';

      const textColor = needsDarkText(color) ? '#000' : '#fff';

      const ini    = parseDate(row.EntradaProd);
      const finMod = parseDate(row['ModFecha Pentrega'] || row.ModFecha_Pentrega);
      const finOrig= parseDate(row['Fecha Pentrega']    || row.Fecha_Pentrega);
      const fin    = finMod || finOrig;

      // Posición de barra dentro de los 5 días visibles, saltando festivos
      // Si hay búsqueda activa, usar fecha relevante como referencia de posición
      const busquedaBar = activeBastidorKey || acSelectedModel || acSelectedClient ||
                           document.getElementById('filterSearch').value.trim();
      // Siempre usar getRelevantDate para posicionar correctamente MQ con Origen MS
      const fechaRef = getRelevantDate(row);

      let barLeft = '', barWidth = '', hasBar = false;
      if (fechaRef) {
        const weekStart = new Date(currentWeekMonday); weekStart.setHours(0,0,0,0);
        const weekEnd   = addDays(weekStart, 4);        weekEnd.setHours(23,59,59,999);

        // MQ con Origen MS entregado: barra solo en el día de Fecha salida MQ
        const esOrigenMSEntregado = (row['Estado MQ'] || row.Estado_MQ || '') === 'Origen MS' &&
                                    !!(row['Fecha salida MQ'] || row.Fecha_salida_MQ);

        const barIni    = ini || fechaRef;
        const barStart  = (busquedaBar || esOrigenMSEntregado) ? fechaRef : (barIni < weekStart ? weekStart : barIni);
        const barFinish = (busquedaBar || esOrigenMSEntregado) ? fechaRef : ((fin || fechaRef) > weekEnd ? weekEnd : (fin || fechaRef));

        const startIdx = Math.round((barStart - currentWeekMonday) / 86400000);
        const endIdx   = Math.round((barFinish - currentWeekMonday) / 86400000);

        if (endIdx >= 0 && startIdx <= 4) {
          let s = Math.max(0, startIdx);
          while (s <= 4 && isNonWorking(weekDays[s])) s++;
          let e = busquedaBar ? s : Math.min(4, endIdx);
          while (e >= 0 && isNonWorking(weekDays[e])) e--;

          if (s <= 4 && e >= 0) {
            barLeft = s * DAY_W;
            const esDiaUnico = busquedaBar || esOrigenMSEntregado;
            if (esDiaUnico) {
              barWidth = DAY_W;
            } else {
              // Calcular hasta el último día laborable (sin festivos)
              let lastDay = 4;
              while (lastDay > s && isNonWorking(weekDays[lastDay])) lastDay--;
              barWidth = (lastDay - s + 1) * DAY_W;
            }
            hasBar = true;
          }
        }
      }

      const bastidor = row['Código bastidor'] || row.Codigo_bastidor || '';
      const etiqueta = key + '-' + maquina + (bastidor ? '-' + bastidor : '') + '-' + cliente;

      html += `<div class="gantt-row">`;
      html += `<div class="gantt-row-label" onclick="showDetail('${key}')">
        <span class="row-key">${key}</span>
        <div class="row-info">
          <div class="row-machine">${maquina}${bastidor ? ` <span class="row-bastidor">· ${bastidor}</span>` : ''}</div>
          <div class="row-client">${cliente}</div>
        </div>
      </div>`;

      html += `<div class="gantt-row-bars" style="position:relative">`;

      // Fondos de días — festivos como bloque fusionado
      let fi = 0;
      while (fi < weekDays.length) {
        const fd = weekDays[fi];
        const fnw = isNonWorking(fd);
        const ftd = isToday(fd);
        if (fnw && !ftd) {
          let fj = fi;
          while (fj < weekDays.length && isNonWorking(weekDays[fj]) && !isToday(weekDays[fj])) fj++;
          const fcount = fj - fi;
          html += `<div class="day-bg-nw-block" style="width:${DAY_W * fcount}px"></div>`;
          fi = fj;
        } else {
          html += `<div class="day-bg ${ftd?'today':''}"></div>`;
          fi++;
        }
      }


      // Línea de hoy
      if (todayLeft >= 0) {
        html += `<div class="today-line" style="left:${todayLeft}px"></div>`;
      }

      // Barra
      if (hasBar) {
        const dataStr = encodeURIComponent(JSON.stringify({
          key, maquina, cliente, color,
          ini: dateToStr(ini), fin: dateToStr(fin),
          finMod: dateToStr(finMod), finOrig: dateToStr(finOrig),
          fechaSalida: dateToStr(parseDate(fechaSalida)),
          bastidor: row['Código bastidor'] || row.Codigo_bastidor || '',
          estadoMQ: row['Estado MQ'] || row.Estado_MQ || '—',
          observaciones: row['Observaciones de pedido'] || '',
          etiqueta
        }));
        const barStyle = `left:${barLeft}px;width:${barWidth}px;background:${color};color:${textColor}`;
      html += `<div class="gantt-bar"
          style="${barStyle}"
          onmouseenter="showTooltip(event,'${dataStr}')"
          onmouseleave="hideTooltip()"
        >${etiqueta}</div>`;
      }

      html += '</div></div>';
    });
  }

  html += '</div></div>';
  document.getElementById('ganttWrapper').innerHTML = html;
  updateStats(data);
  adjustWrapperHeight();
}

// ─── COLOR ESTADO MQ ─────────────────────────────────────────────────────────
function getEstadoColor(estado) {
  switch((estado || '').trim()) {
    case 'Pendiente':   return { bg: '#4b5563', text: '#fff' };
    case 'Picking':     return { bg: '#fef9c3', text: '#713f12' };
    case 'Producción':  return { bg: '#ffff00', text: '#000' };
    case 'Finalizado':  return { bg: '#92d050', text: '#1a3a0a' };
    case 'Entregado':   return { bg: '#00b050', text: '#fff' };
    case 'DEMO':        return { bg: '#3b82f6', text: '#fff' };
    case 'ANULADO':     return { bg: '#dc2626', text: '#fff' };
    default:            return { bg: '#e5e7eb', text: '#374151' };
  }
}

// ─── TOOLTIP ──────────────────────────────────────────────────────────────────
function showTooltip(e, dataStr) {
  const d  = JSON.parse(decodeURIComponent(dataStr));
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `
    <div class="tooltip-title">${d.etiqueta}</div>
    <div class="tooltip-row"><span>Pedido</span><span>${d.key}</span></div>
    <div class="tooltip-row"><span>Máquina</span><span>${d.maquina}</span></div>
    ${d.bastidor ? `<div class="tooltip-row"><span>Bastidor</span><span>${d.bastidor}</span></div>` : ''}
    <div class="tooltip-row"><span>Cliente</span><span>${d.cliente}</span></div>
    <div class="tooltip-row"><span>Inicio prod.</span><span>${d.ini}</span></div>
    <div class="tooltip-row"><span>F. entrega orig.</span><span>${d.finOrig}</span></div>
    ${d.finMod && d.finMod!=='—' ? `<div class="tooltip-row"><span>F. entrega mod.</span><span style="color:#ffc000">${d.finMod}</span></div>` : ''}
    ${d.fechaSalida && d.fechaSalida!=='—' ? `<div class="tooltip-row"><span>Salida almacén</span><span>${d.fechaSalida}</span></div>` : ''}
    ${d.estadoMQ && d.estadoMQ!=='—' ? (() => { const ec = getEstadoColor(d.estadoMQ); return `<div class="tooltip-row"><span>Estado MQ</span><span style="background:${ec.bg};color:${ec.text};font-weight:700;padding:2px 8px;border-radius:3px;font-size:11px">${d.estadoMQ}</span></div>`; })() : ''}
    ${d.observaciones ? `<div class="tooltip-row"><span>Observaciones</span><span style="color:#f59e0b;max-width:180px;white-space:normal;text-align:right">${d.observaciones}</span></div>` : ''}
  `;
  tt.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  const x = e.clientX + 16, y = e.clientY - 10;
  const w = tt.offsetWidth,  h = tt.offsetHeight;
  tt.style.left = (x+w > window.innerWidth  ? x-w-32 : x) + 'px';
  tt.style.top  = (y+h > window.innerHeight ? y-h    : y) + 'px';
}

document.addEventListener('mousemove', e => {
  if (document.getElementById('tooltip').classList.contains('visible')) moveTooltip(e);
});

function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats(data) {
  const total       = data.length;
  const entregadas  = data.filter(r => r['Fecha salida MQ'] || r.Fecha_salida_MQ).length;
  const finalizadas = data.filter(r => (r['Fecha fin Fab']||r.Fecha_fin_Fab) && !(r['Fecha salida MQ']||r.Fecha_salida_MQ)).length;
  const conFecha    = data.filter(r => (r['ModFecha Pentrega']||r.ModFecha_Pentrega||r['Fecha Pentrega']||r.Fecha_Pentrega) && !(r['Fecha fin Fab']||r.Fecha_fin_Fab) && !(r['Fecha salida MQ']||r.Fecha_salida_MQ)).length;
  const sinFecha    = data.filter(r => !(r['ModFecha Pentrega']||r.ModFecha_Pentrega||r['Fecha Pentrega']||r.Fecha_Pentrega) && !(r['Fecha fin Fab']||r.Fecha_fin_Fab) && !(r['Fecha salida MQ']||r.Fecha_salida_MQ)).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><span>Esta semana:</span><span class="stat-val">${total}</span></div>
    <div class="stat"><span>Con fecha entrega:</span><span class="stat-val" style="color:#b8860b">${conFecha}</span></div>
    <div class="stat"><span>Finalizadas:</span><span class="stat-val" style="color:#92d050">${finalizadas}</span></div>
    <div class="stat"><span>Entregadas:</span><span class="stat-val" style="color:#00b050">${entregadas}</span></div>
    <div class="stat"><span>Sin fecha:</span><span class="stat-val" style="color:#4b5563">${sinFecha}</span></div>
  `;
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function needsDarkText(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 128;
}

function showDetail(key) { /* reservado */ }

// ─── BUSCADOR BASTIDOR ───────────────────────────────────────────────────────
function onBastidorInput() {
  const val = document.getElementById('filterBastidor').value.trim();
  const res = document.getElementById('bastidorResult');

  if (!val) {
    res.style.display = 'none';
    activeBastidorKey = '';
    renderGantt();
    return;
  }

  const valLow = val.toLowerCase();
  const matches = allData.filter(row => {
    const b = row['Código bastidor'] || row.Codigo_bastidor || '';
    return b.toLowerCase().includes(valLow);
  }).slice(0, 10);

  if (matches.length === 0) { res.style.display = 'none'; return; }

  res.innerHTML = '';
  matches.forEach(row => {
    const b   = row['Código bastidor'] || row.Codigo_bastidor || '';
    const key = row.KeyPedido || '—';
    const maq = row.Máquina || row.Maquina || '—';
    const cli = row.CLIENTE || '—';
    const item = document.createElement('div');
    item.className = 'bastidor-result-item';
    item.innerHTML = `
      <span class="bri-key">${key} · ${b}</span>
      <span class="bri-info">${maq} · ${cli}</span>
    `;
    item.onclick = () => jumpToBastidor(row);
    res.appendChild(item);
  });
  res.style.display = 'block';
}

function onBastidorKey(e) {
  if (e.key === 'Escape') {
    document.getElementById('bastidorResult').style.display = 'none';
  }
}

function jumpToBastidor(row) {
  document.getElementById('bastidorResult').style.display = 'none';
  const b = row['Código bastidor'] || row.Codigo_bastidor || '';
  document.getElementById('filterBastidor').value = b;

  // Guardar el pedido activo para filtrarlo en getFilteredData
  activeBastidorKey = row.KeyPedido || '';

  // Calcular fecha relevante del pedido
  const fechaRef = getRelevantDate(row);
  if (fechaRef) {
    currentWeekMonday = getMondayOf(fechaRef);
    syncYearFilterToWeek();
  }

  // Limpiar búsqueda principal para no interferir
  document.getElementById('filterSearch').value = '';
  acSelectedModel = '';
  acSelectedClient = '';
  document.getElementById('searchResultsBar').classList.remove('visible');

  renderGantt();
}

// Cerrar dropdown bastidor al clicar fuera
document.addEventListener('click', e => {
  if (!e.target.closest('.bastidor-wrapper')) {
    document.getElementById('bastidorResult').style.display = 'none';
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Ajustar altura del wrapper al espacio disponible
function adjustWrapperHeight() {
  const wrapper = document.getElementById('ganttWrapper');
  const top = wrapper.getBoundingClientRect().top;
  wrapper.style.height = (window.innerHeight - top - 2) + 'px';
}

// Redibujar al cambiar tamaño de ventana
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { renderGantt(); adjustWrapperHeight(); }, 150);
});

loadData();
</script>
